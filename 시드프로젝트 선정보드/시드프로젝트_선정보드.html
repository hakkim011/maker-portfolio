<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시드 프로젝트 선정 보드 편집기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  /* ── RESET ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand-black: #0B1215;
    --brand-neon: #edff4b;
    --bg-board: #FFF8F0;
    --ed-bg: #18191b;
    --ed-surface: rgba(255,255,255,0.05);
    --ed-border: rgba(255,255,255,0.09);
    --ed-text: #e2e2e2;
    --ed-sub: rgba(255,255,255,0.38);
  }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── APP LAYOUT ── */
  .app { display: flex; height: 100vh; }

  /* ─────────────────────────
     EDITOR PANEL (left)
  ───────────────────────── */
  .editor {
    width: 368px;
    flex-shrink: 0;
    background: var(--ed-bg);
    color: var(--ed-text);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--ed-border);
    overflow: hidden;
  }

  .editor-top {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--ed-border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-top-logo { font-size: 18px; }
  .editor-top-title { font-size: 14px; font-weight: 800; color: var(--brand-neon); }

  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .editor-scroll::-webkit-scrollbar { width: 4px; }
  .editor-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* Section label */
  .sec-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--ed-sub);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Input group */
  .ig { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .ig:last-child { margin-bottom: 0; }
  .ig label { font-size: 11px; font-weight: 600; color: var(--ed-sub); }
  .ig input, .ig textarea {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 9px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .ig input:focus, .ig textarea:focus { border-color: var(--brand-neon); }
  .ig textarea { resize: none; height: 58px; line-height: 1.5; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Add card button */
  .add-card-btn {
    width: 100%;
    padding: 10px;
    background: rgba(237,255,75,0.08);
    border: 1.5px dashed rgba(237,255,75,0.3);
    border-radius: 8px;
    color: var(--brand-neon);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .add-card-btn:hover { background: rgba(237,255,75,0.16); }

  /* Card item in editor */
  .card-item {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .card-item:last-child { margin-bottom: 0; }

  .card-item-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 13px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--ed-border);
  }
  .card-item-hd span { font-size: 11px; font-weight: 700; color: var(--ed-sub); }
  .card-del-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer; font-size: 15px; line-height: 1;
    transition: color 0.15s;
  }
  .card-del-btn:hover { color: #ff6b6b; }

  .card-item-bd { padding: 11px 13px; display: flex; flex-direction: column; gap: 7px; }

  /* Image upload area (in editor) */
  .img-area {
    width: 100%;
    aspect-ratio: 4/3;
    border: 1.5px dashed rgba(255,255,255,0.13);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.03);
    transition: border-color 0.15s;
    position: relative;
  }
  .img-area:hover { border-color: var(--brand-neon); }
  .img-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .img-placeholder .ph-icon { font-size: 22px; opacity: 0.35; }
  .img-placeholder span { font-size: 11px; color: var(--ed-sub); font-weight: 600; }

  .card-name-in {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 8px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .card-name-in:focus { border-color: var(--brand-neon); }

  .card-reason-in {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 8px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
    width: 100%;
    resize: none;
    height: 56px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .card-reason-in:focus { border-color: var(--brand-neon); }

  /* Editor footer */
  .editor-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--ed-border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .exp-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .exp-btn:hover { transform: translateY(-1px); }
  .exp-btn.primary { background: var(--brand-neon); color: var(--brand-black); }
  .exp-btn.secondary { background: rgba(255,255,255,0.07); color: var(--ed-text); }

  /* ─────────────────────────
     PREVIEW AREA (right)
  ───────────────────────── */
  .preview-area {
    flex: 1;
    overflow: auto;
    background: #242424;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px;
  }

  .board-scale-wrap { transform-origin: top left; }

  /* ─────────────────────────
     BOARD (always 1200px)
  ───────────────────────── */
  #board {
    width: 1200px;
    background: var(--bg-board);
    font-family: 'Pretendard', sans-serif;
  }

  .board-header {
    background: var(--brand-neon);
    padding: 44px 64px 48px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .hd-deco-dot {
    position: absolute;
    width: 140px; height: 140px;
    background: var(--brand-black);
    border-radius: 50%;
    bottom: -40px; right: 240px;
    opacity: 0.06;
    pointer-events: none;
  }

  .hd-left {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 16px;
  }

  .board-logo { width: 120px; }

  .board-title {
    font-size: 42px; font-weight: 900;
    color: var(--brand-black);
    line-height: 1.05; letter-spacing: -0.02em;
  }
  .board-title em {
    display: inline; font-style: normal;
    background: var(--brand-black);
    color: var(--brand-neon);
    padding: 2px 12px 5px;
    border-radius: 6px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  .board-meta {
    font-family: 'Poppins', sans-serif;
    font-size: 13px; font-weight: 600;
    color: rgba(11,18,21,0.45);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .hd-right { display: none; }

  /* Cards */
  .board-body { padding: 40px 64px 64px; }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .b-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }

  .b-card-img {
    width: 100%; aspect-ratio: 4/3;
    overflow: hidden;
    background: #ededed;
    display: flex; align-items: center; justify-content: center;
  }
  .b-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .b-card-img .no-img { font-size: 38px; opacity: 0.18; }

  .b-card-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 6px; }

  .b-card-name { font-size: 15px; font-weight: 800; color: var(--brand-black); }

  .b-card-tag {
    display: inline-block;
    background: rgba(11,18,21,0.07);
    color: rgba(11,18,21,0.55);
    font-size: 11px; font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px;
  }

  .b-card-reason {
    font-size: 12.5px;
    color: rgba(11,18,21,0.5);
    line-height: 1.55;
    word-break: break-word;
    overflow-wrap: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .reason-counter {
    text-align: right;
    font-size: 11px;
    color: var(--ed-sub);
    margin-top: 2px;
  }
  .reason-counter.over { color: #ff6b6b; }

  .board-empty {
    text-align: center;
    padding: 60px 0;
    color: rgba(11,18,21,0.2);
    font-size: 15px;
  }

  /* ── PRINT ── */
  @media print {
    @page :first { margin: 0; }
    @page { margin: 16mm 0 0 0; }
    @page { margin: 0; size: A3 landscape; }
    body { overflow: visible; height: auto; }
    .app { display: block; height: auto; }
    .editor { display: none !important; }
    .preview-area { padding: 0; background: none; display: block; overflow: visible; }
    .board-scale-wrap { transform: none !important; width: auto !important; height: auto !important; }
    #board { width: 100%; box-shadow: none; }
    .board-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #edff4b !important; }
    .board-title em { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .b-card-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .b-card { box-shadow: none; border: 1px solid #ebebeb; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── 편집 패널 ── -->
  <aside class="editor">
    <div class="editor-top">
      <span class="editor-top-logo">🌱</span>
      <span class="editor-top-title">시드 프로젝트 선정 보드</span>
    </div>

    <div class="editor-scroll">

      <!-- 기본 정보 -->
      <div>
        <div class="sec-label">기본 정보</div>
        <div class="row2">
          <div class="ig">
            <label>기수</label>
            <input type="text" id="in-kisu" placeholder="3기" oninput="render()">
          </div>
          <div class="ig">
            <label>주차</label>
            <input type="text" id="in-week" placeholder="3주차" oninput="render()">
          </div>
        </div>
        <div class="ig">
          <label>기간</label>
          <div class="row2">
            <input type="date" id="in-date-start" oninput="render()" placeholder="시작일">
            <input type="date" id="in-date-end" oninput="render()" placeholder="종료일">
          </div>
        </div>
      </div>

      <!-- 카드 -->
      <div>
        <div class="sec-label">선정 카드</div>
        <div id="cards-container"></div>
        <button class="add-card-btn" onclick="addCard()">+ 카드 추가</button>
      </div>

    </div>

    <div class="editor-footer">
      <button class="exp-btn primary" onclick="exportImage()">🖼️ 이미지로 저장</button>
      <button class="exp-btn secondary" onclick="window.print()">🖨️ PDF로 저장</button>
    </div>
  </aside>

  <!-- ── 미리보기 ── -->
  <main class="preview-area" id="preview-area">
    <div class="board-scale-wrap" id="board-scale-wrap">
      <div id="board"></div>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
/* ── STATE ── */
let cards = [];
let nextId = 1;

/* ── HELPERS ── */
function getInfo() {
  const kisu = document.getElementById('in-kisu').value.trim();
  const week = document.getElementById('in-week').value.trim();
  const startRaw = document.getElementById('in-date-start').value;
  const endRaw = document.getElementById('in-date-end').value;
  function fmt(raw) {
    if (!raw) return '';
    const [y, m, d] = raw.split('-');
    return `${y}.${m}.${d}`;
  }
  const start = fmt(startRaw);
  const end = fmt(endRaw);
  let period = '';
  if (start && end) period = `${start} ~ ${end}`;
  else if (start) period = start;
  return { kisu, week, period };
}

/* ── CARD ACTIONS ── */
function addCard() {
  const id = nextId++;
  cards.push({ id, image: null, name: '', challenge: '', reason: '' });
  renderEditorCards();
  render();
}

function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  renderEditorCards();
  render();
}

function updateCard(id, field, value) {
  const card = cards.find(c => c.id === id);
  if (card) { card[field] = value; render(); }
}

function updateCounter(id, value) {
  const el = document.getElementById('counter-' + id);
  if (!el) return;
  el.textContent = value.length + '/60';
  el.className = 'reason-counter' + (value.length >= 60 ? ' over' : '');
}

function handleImage(input, id) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    card.image = e.target.result;
    // update just the img area in editor (no full re-render to preserve focus)
    const area = document.getElementById('img-area-' + id);
    if (area) {
      area.innerHTML = `<img src="${e.target.result}">
        <input type="file" id="file-${id}" accept="image/*" style="display:none" onchange="handleImage(this,${id})">`;
    }
    render();
  };
  reader.readAsDataURL(file);
}

function triggerUpload(id) {
  document.getElementById('file-' + id).click();
}

/* ── RENDER EDITOR CARDS ── */
function renderEditorCards() {
  document.getElementById('cards-container').innerHTML = cards.map((card, i) => `
    <div class="card-item">
      <div class="card-item-hd">
        <span>카드 ${i + 1}</span>
        <button class="card-del-btn" onclick="removeCard(${card.id})">✕</button>
      </div>
      <div class="card-item-bd">
        <div class="img-area" id="img-area-${card.id}" onclick="triggerUpload(${card.id})">
          ${card.image
            ? `<img src="${card.image}">`
            : `<div class="img-placeholder"><div class="ph-icon">🖼️</div><span>클릭해서 이미지 추가</span></div>`}
          <input type="file" id="file-${card.id}" accept="image/*" style="display:none" onchange="handleImage(this,${card.id})">
        </div>
        <input class="card-name-in" type="text" placeholder="이름"
          value="${escHtml(card.name)}"
          oninput="updateCard(${card.id},'name',this.value)">
        <input class="card-name-in" type="text" placeholder="챌린지명 (예: 바다 챌린지)"
          style="font-weight:400"
          value="${escHtml(card.challenge)}"
          oninput="updateCard(${card.id},'challenge',this.value)">
        <textarea class="card-reason-in" placeholder="선정 이유 (최대 60자)"
          maxlength="60"
          oninput="updateCard(${card.id},'reason',this.value);updateCounter(${card.id},this.value)">${escHtml(card.reason)}</textarea>
        <div class="reason-counter" id="counter-${card.id}">${card.reason.length}/60</div>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── RENDER BOARD ── */
function render() {
  const { kisu, week, period } = getInfo();
  const metaParts = [kisu, week, period].filter(Boolean);
  const count = String(cards.length).padStart(2, '0');

  document.getElementById('board').innerHTML = `
    <div class="board-header">
      <svg style="position:absolute;width:420px;height:420px;top:-100px;right:-80px;pointer-events:none;"
           viewBox="0 0 420 420" overflow="visible" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.08">
          <ellipse fill="none" stroke="#0b1215" stroke-width="3.5" cx="210" cy="210" rx="178" ry="71"/>
          <ellipse fill="none" stroke="#0b1215" stroke-width="2.5" cx="210" cy="210" rx="198" ry="79"/>
          <ellipse fill="none" stroke="#0b1215" stroke-width="2"   cx="210" cy="210" rx="216" ry="86"/>
          <ellipse fill="none" stroke="#0b1215" stroke-width="1.5" cx="210" cy="210" rx="232" ry="93"/>
          <circle  fill="#0b1215" cx="210" cy="210" r="162"/>
        </g>
      </svg>
      <div class="hd-deco-dot"></div>
      <div class="hd-left">
        <img class="board-logo" src="../메이커작품집/Logo1.svg" onerror="this.style.display='none'">
        <div class="board-title">이번 주<br><em>시드 프로젝트</em></div>
        ${metaParts.length ? `<div class="board-meta">${metaParts.join(' · ')}</div>` : ''}
      </div>
      <div class="hd-right">
        <div class="hd-count-label">Selected</div>
        <div class="hd-count-num">${count}</div>
      </div>
    </div>
    <div class="board-body">
      ${cards.length === 0
        ? `<div class="board-empty">← 왼쪽에서 카드를 추가해보세요</div>`
        : `<div class="board-grid">
            ${cards.map(card => `
              <div class="b-card">
                <div class="b-card-img">
                  ${card.image ? `<img src="${card.image}">` : `<div class="no-img">🖼️</div>`}
                </div>
                <div class="b-card-body">
                  <div class="b-card-name">${escHtml(card.name) || '이름'}</div>
                  ${card.challenge ? `<div><span class="b-card-tag">${escHtml(card.challenge)}</span></div>` : ''}
                  <div class="b-card-reason">${escHtml(card.reason)}</div>
                </div>
              </div>`).join('')}
          </div>`}
    </div>
  `;
  scaleBoard();
}

/* ── SCALE ── */
function scaleBoard() {
  const area = document.getElementById('preview-area');
  const wrap = document.getElementById('board-scale-wrap');
  const board = document.getElementById('board');
  const availW = area.clientWidth - 72;
  const boardW = 1200;
  const scale = Math.min(availW / boardW, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = boardW + 'px';
  const scaledH = board.scrollHeight * scale;
  wrap.style.marginBottom = (scaledH - board.scrollHeight) + 'px';
}

window.addEventListener('resize', scaleBoard);

/* ── EXPORT IMAGE ── */
function exportImage() {
  const { kisu, week } = getInfo();
  const wrap = document.getElementById('board-scale-wrap');
  const board = document.getElementById('board');
  const prevTransform = wrap.style.transform;
  wrap.style.transform = 'scale(1)';

  // 로고 img는 로컬 파일 환경에서 canvas taint 유발 → 캡처 중 숨김 처리
  const logo = board.querySelector('.board-logo');
  if (logo) logo.style.visibility = 'hidden';

  html2canvas(board, {
    scale: 2,
    allowTaint: true,
    useCORS: false,
    backgroundColor: '#FFF8F0',
    logging: false,
  }).then(canvas => {
    wrap.style.transform = prevTransform;
    if (logo) logo.style.visibility = '';
    const a = document.createElement('a');
    const name = [kisu, week].filter(Boolean).join('_') || '시드프로젝트';
    a.download = `${name}_시드프로젝트.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  }).catch(err => {
    wrap.style.transform = prevTransform;
    if (logo) logo.style.visibility = '';
    console.error('html2canvas error:', err);
    alert('이미지 저장에 실패했어요.\n브라우저 주소창에 파일 경로(file://)가 아닌 로컬 서버로 열거나, PDF로 저장해주세요.');
  });
}

/* ── INIT ── */
addCard();
addCard();
</script>
</body>
</html>
